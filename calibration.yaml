# Per-servo calibration state.
# Loaded by arm_gui.py and the future ROS bridge.
# Numbers come from range_record.py + set_correction.py runs.

port: /dev/ttyACM0
baud: 1000000

servos:
  - id: 1
    joint_name: base
    type: continuous            # free-spinning; constrained by soft limits below
    encoder_min: 27
    encoder_max: 4095
    encoder_center: 2049
    soft_min: 1024              # ±90° from center; keeps the 0/4095 seam behind the arm
    soft_max: 3072
    position_correction: 1146
    direction: -1
    model: 777
    notes: soft-limited to ±90° so it doesn't spin freely and the seam stays out of range; recalibrated 2026-07-02

  - id: 2
    joint_name: joint2
    type: bounded
    encoder_min: 731
    encoder_max: 3408
    encoder_center: 2069
    soft_min: 781               # 50-step margin from hard stops
    soft_max: 3358
    position_correction: -1408
    direction: -1
    model: 2825
    notes: 235.3° range, recalibrated 2026-07-02

  - id: 3
    joint_name: joint3
    type: bounded
    encoder_min: 864
    encoder_max: 4006
    encoder_center: 2048        # URDF-neutral pose, NOT mid-travel (2435) — this fixes the 30° visual offset
    soft_min: 914               # 50-step margin from hard stops
    soft_max: 3956
    position_correction: -489
    direction: -1
    model: 777
    notes: >
      neutral anchored to URDF zero, which is offset from mechanical mid-travel; 276.2° range;
      max (4006) is ~89 steps from the 4095 seam but the hard stop prevents crossing; recalibrated 2026-07-02

  - id: 4
    joint_name: joint4
    type: bounded
    encoder_min: 859
    encoder_max: 3224
    encoder_center: 2041
    soft_min: 909               # 50-step margin from hard stops
    soft_max: 3174
    position_correction: -1627
    direction: -1
    model: 777
    notes: 207.9° range, recalibrated 2026-07-02

  - id: 5
    joint_name: wrist_roll
    type: continuous            # free-spinning wrist roll, no hard stops
    encoder_min: 0
    encoder_max: 4095
    encoder_center: 2048
    soft_min: 100               # ~±170° from center; keeps off the 0/4095 seam
    soft_max: 3996              # tighten if the cable twists before this
    position_correction: -1956
    direction: 1                # verify in RViz; flip to -1 if it rolls backwards
    model: 777
    notes: 360° free spin; neutral anchored at 2048; soft-limited to ~±170° for wire twist; calibrated 2026-07-07

  - id: 6
    joint_name: gripper
    type: bounded
    encoder_min: 664            # fully open
    encoder_max: 2050           # fully closed
    encoder_center: 1745        # CAD pose = gripper_joint 0 (a MID position, not an extreme)
    soft_min: 690               # small margin off the open stop
    soft_max: 2040              # margin off closed; grip force capped by torque limit (addr 48)
    position_correction: 0
    direction: -1               # enc 664(open)->+1.658, enc 2050(closed)->-0.468, matching URDF convention
    model: 777
    notes: jaw 664(open)-2050(closed), 121.6° travel; CAD pose (joint 0) = enc 1745; open=+1.658 rad, closed=-0.468 rad (matches URDF limits [-0.468, 1.658]); grip force via torque limit (addr 48); direction flipped to -1 on 2026-07-07 so the physical jaw tracks the model
