# Per-servo calibration state.
# Loaded by arm_gui.py and the future ROS bridge.
# Numbers come from range_record.py + set_correction.py runs.

port: /dev/ttyACM2
baud: 1000000

servos:
  - id: 1
    joint_name: base
    type: continuous            # no hard stops
    encoder_min: 0              # full encoder range available
    encoder_max: 4095
    encoder_center: 2044
    # safety soft limits (±90° from center) to avoid wraparound during GUI testing
    soft_min: 1024
    soft_max: 3072
    position_correction: 0
    direction: 1                # +1 / -1 per URDF; TBD
    model: 777
    notes: continuous rotation, no hard stops; soft-limited to ±90° for safety

  - id: 2
    joint_name: joint2
    type: bounded
    encoder_min: 902            # from range_record
    encoder_max: 3280
    encoder_center: 2091
    soft_min: 950               # 50-step margin from hard stops
    soft_max: 3230
    position_correction: -1937  # set via set_correction.py; raw range crossed 0/4095 before
    direction: 1
    model: 2825                 # variant; tracks identically
    notes: 209° range, fully calibrated

  - id: 3
    joint_name: joint3
    type: bounded
    encoder_min: 981
    encoder_max: 3064
    encoder_center: 2022
    soft_min: 1030          # 50-step margin from hard stops
    soft_max: 3015
    position_correction: 516    # retained from previous calibration
    direction: 1
    model: 777
    notes: 183° range, recalibrated post-arm-reassembly

  - id: 4
    joint_name: joint4
    type: bounded
    encoder_min: 1029
    encoder_max: 3059
    encoder_center: 2044
    soft_min: 1080          # 50-step margin from hard stops
    soft_max: 3010
    position_correction: set_via_set_correction_py    # updated post-reassembly
    direction: 1
    model: 777
    notes: 178° range; was reassigned to wrist_roll then back to joint4

  - id: 5
    joint_name: wrist_roll
    type: uncalibrated
    model: 777
    notes: |
      new servo, factory-flashed to ID=5. wrist roll module not yet built.
      when mounted on the wrist roll axis:
        - drive to physical midpoint
        - if encoder reads far from 2048, run set_correction.py --target 2048
        - run range_record.py for soft limits
        - software-limit to ±180° to avoid wire-twist past the cable-loop slack

  - id: 6
    joint_name: gripper
    type: uncalibrated
    model: TBD
    notes: |
      6th servo not yet purchased. when acquired:
        - flash to ID=6 with servo_id_setup.py (one servo at a time on the bus!)
        - calibrate by recording fully-open and fully-closed encoder positions
        - set torque limit (addr 48) to cap grip force
