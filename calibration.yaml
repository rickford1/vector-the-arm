# Per-servo calibration state.
# Loaded by arm_gui.py and the future ROS bridge.
# Numbers come from range_record.py + set_correction.py runs.

port: /dev/ttyACM0
baud: 1000000

servos:
  - id: 1
    joint_name: base
    type: continuous            # free-spinning; constrained by soft limits below
    encoder_min: 27
    encoder_max: 4095
    encoder_center: 2049
    soft_min: 1024              # ±90° from center; keeps the 0/4095 seam behind the arm
    soft_max: 3072
    position_correction: 1146
    direction: -1
    model: 777
    notes: soft-limited to ±90° so it doesn't spin freely and the seam stays out of range; recalibrated 2026-07-02

  - id: 2
    joint_name: joint2
    type: bounded
    encoder_min: 731
    encoder_max: 3408
    encoder_center: 2069
    soft_min: 781               # 50-step margin from hard stops
    soft_max: 3358
    position_correction: -1408
    direction: -1
    model: 2825
    notes: 235.3° range, recalibrated 2026-07-02

  - id: 3
    joint_name: joint3
    type: bounded
    encoder_min: 864
    encoder_max: 4006
    encoder_center: 2048        # URDF-neutral pose, NOT mid-travel (2435) — this fixes the 30° visual offset
    soft_min: 914               # 50-step margin from hard stops
    soft_max: 3956
    position_correction: -489
    direction: -1
    model: 777
    notes: >
      neutral anchored to URDF zero, which is offset from mechanical mid-travel; 276.2° range;
      max (4006) is ~89 steps from the 4095 seam but the hard stop prevents crossing; recalibrated 2026-07-02

  - id: 4
    joint_name: joint4
    type: bounded
    encoder_min: 859
    encoder_max: 3224
    encoder_center: 2041
    soft_min: 909               # 50-step margin from hard stops
    soft_max: 3174
    position_correction: -1627
    direction: -1
    model: 777
    notes: 207.9° range, recalibrated 2026-07-02

  - id: 5
    joint_name: wrist_roll
    type: uncalibrated
    model: 777
    notes: |
      new servo, factory-flashed to ID=5. wrist roll module not yet built.
      when mounted on the wrist roll axis:
        - drive to physical midpoint
        - if encoder reads far from 2048, run set_correction.py --target 2048
        - run range_record.py for soft limits
        - software-limit to ±180° to avoid wire-twist past the cable-loop slack

  - id: 6
    joint_name: gripper
    type: uncalibrated
    model: TBD
    notes: |
      6th servo not yet purchased. when acquired:
        - flash to ID=6 with servo_id_setup.py (one servo at a time on the bus!)
        - calibrate by recording fully-open and fully-closed encoder positions
        - set torque limit (addr 48) to cap grip force
